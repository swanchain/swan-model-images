name: Build Engine Images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.*'
      - 'scripts/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sglang
          - whisper
          - diffusion

env:
  REGISTRY: ghcr.io/swanchain/swan-model-images

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: sglang
            dockerfile: Dockerfile.sglang
          - name: whisper
            dockerfile: Dockerfile.whisper
          - name: diffusion
            dockerfile: Dockerfile.diffusion
      fail-fast: false
    permissions:
      contents: read
      packages: write
    # Skip if a specific image was requested and this isn't it
    if: >-
      github.event.inputs.image == 'all' ||
      github.event.inputs.image == '' ||
      github.event.inputs.image == matrix.name
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
